name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-server:
    name: Server — lint + test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET:  test-access-secret-must-be-32-chars-long!
      JWT_REFRESH_SECRET: test-refresh-secret-must-be-32-chars-long
      CLIENT_URL:         http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: server/package-lock.json }
      - run: npm ci
        working-directory: server
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: server
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: server/coverage

  build-client:
    name: Client — build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: client/package-lock.json }
      - run: npm ci
        working-directory: client
      - name: Type-check + build
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL:    http://localhost:5000/api/v1
          VITE_SOCKET_URL: http://localhost:5000
